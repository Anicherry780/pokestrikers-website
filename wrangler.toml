name = "pokestrikers-website"
pages_build_output_dir = "public"
compatibility_date = "2024-11-01"

# D1 binding. After you create the database (see SETUP.md), paste its
# database_id below. The binding name MUST stay "DB".
[[d1_databases]]
binding = "DB"
database_name = "pokestrikers-db"
database_id = "7000fb5a-525d-4d9d-8a49-f37894c4af61"

# SESSION_SECRET is set as a secret/environment variable in the Cloudflare
# dashboard (Pages > Settings > Variables and Secrets), NOT here.
# For local dev, create a .dev.vars file with:  SESSION_SECRET="some-long-random-string"

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign up - PokeStrikers</title>
  <link rel="stylesheet" href="css/style.css?v=2" />
</head>
<body>
  <div class="wrap narrow center-screen">
    <main style="width:100%;">
      <div class="center" style="margin-bottom:18px;">
        <a class="brand" href="index.html" style="justify-content:center;">
          <span class="logo">P</span>
          <span class="name">Poke<b>Strikers</b></span>
        </a>
      </div>
      <div class="card">
        <h1 class="title-glow center">Join the vault</h1>
        <p class="center muted" style="margin-top:-6px;">No email required, just pick a username.</p>
        <div id="alert" class="alert"></div>
        <form id="form">
          <label for="username">Username</label>
          <input id="username" name="username" autocomplete="username" placeholder="3 to 20 letters, numbers, _" required />
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="new-password" placeholder="At least 6 characters" required />
          <label for="confirm">Confirm password</label>
          <input id="confirm" name="confirm" type="password" autocomplete="new-password" required />
          <div class="spacer"></div>
          <button class="btn block" id="submit" type="submit">Create account</button>
        </form>
        <p class="center muted" style="margin-top:16px;">
          Already a trainer? <a class="link" href="login.html">Log in</a>
        </p>
        <p class="center muted" style="font-size:.78rem; margin-top:10px;">
          Tip: your account lives on our server, so clearing your browser won't delete it. Just log back in.
        </p>
      </div>
    </main>
  </div>

  <script src="js/common.js?v=2"></script>
  <script>
    if (PS.isLoggedIn()) location.href = "dashboard.html";
    const form = document.getElementById("form");
    const alertEl = document.getElementById("alert");
    const btn = document.getElementById("submit");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      PS.clearAlert(alertEl);
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirm").value;

      if (password !== confirm) { PS.alert(alertEl, "error", "Passwords don't match."); return; }

      btn.disabled = true; btn.textContent = "Creating…";
      try {
        const data = await PS.api("/api/register", { method: "POST", body: { username, password } });
        PS.setAuth(data.token, data.user);
        location.href = data.user.is_admin ? "admin.html" : "dashboard.html";
      } catch (err) {
        PS.alert(alertEl, "error", err.message);
        btn.disabled = false; btn.textContent = "Create account";
      }
    });
  </script>
</body>
</html>
